name: Deploy LAPIS Webapp

on:
  push:
    branches: [webapp]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to server
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Sync backend + src + data to /opt/lapis-webapp (no frontend source/node_modules)
          rsync -avz --delete \
            --exclude='.github' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='frontend' \
            --exclude='backend/tmp' \
            --exclude='results_web' \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@142.93.104.36:/opt/lapis-webapp/

          # Sync built frontend to nginx webroot
          rsync -avz --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            ./frontend/dist/ root@142.93.104.36:/var/www/lapis.emanuelemusumeci.com/

          # Rebuild and restart the Docker container
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@142.93.104.36 \
            "cd /opt/lapis-webapp && docker compose build && docker compose up -d"

          rm -f /tmp/deploy_key
