# LAPIS Demo Configuration
# Loaded by demo/app.py via yaml.safe_load

domains:
  - blocksworld
  - barman
  - floortile
  - grippers
  - storage
  - termes
  - tyreworld

models:
  claude-sonnet-4-6: "Claude Sonnet 4.6"
  claude-3-5-sonnet-20241022: "Claude 3.5 Sonnet"
  gpt-4o: "GPT-4o"
  gpt-4o-mini: "GPT-4o mini"

defaults:
  max_refinements: 3
  planner_timeout: 180
  planner: "pyperplan"
  model_id: "claude-sonnet-4-6"

planners:
  - pyperplan
  - up_fd
  - fd
