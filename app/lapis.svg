<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="lapisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#29b6f6"/>
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0e1117"/>
    </linearGradient>
  </defs>

  <!-- Base layer - dark background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#darkGradient)" stroke="#4fc3f7" stroke-width="1.5" opacity="0.9"/>

  <!-- Iterative layers representation -->
  <!-- Layer 1 - bottom -->
  <path d="M12 30 L24 36 L36 30 L24 24 Z" fill="#4fc3f7" opacity="0.3"/>

  <!-- Layer 2 - middle -->
  <path d="M12 25 L24 31 L36 25 L24 19 Z" fill="#4fc3f7" opacity="0.5"/>

  <!-- Layer 3 - top (main) -->
  <path d="M12 20 L24 26 L36 20 L24 14 Z" fill="url(#lapisGradient)"/>

  <!-- Upward arrow indicating synthesis/iteration -->
  <path d="M24 10 L28 16 L25.5 16 L25.5 22 L22.5 22 L22.5 16 L20 16 Z" fill="#4fc3f7" opacity="0.9"/>

  <!-- Refresh/iteration circle indicator -->
  <path d="M34 18 A10 10 0 0 1 34 30" stroke="#4fc3f7" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M36 29 L34 32 L32 28" stroke="#4fc3f7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
